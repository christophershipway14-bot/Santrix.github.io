<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Santrix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{
  min-height:100vh;
  color:white;
  overflow-x:hidden;
  background:black;
}

/* 🌍 Animated Earth Background */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1920") no-repeat center/cover;
  z-index:-2;
  animation:earthMove 70s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

@keyframes earthMove{
  0%{transform:scale(1.1);}
  50%{transform:scale(1.15) translateY(-20px);}
  100%{transform:scale(1.1);}
}

/* HEADER */
header{
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.05);
}

nav a{
  color:white;
  margin-left:20px;
  text-decoration:none;
  cursor:pointer;
  font-weight:bold;
}

section{
  padding:80px 20px;
  text-align:center;
}

.hidden{display:none;}

.products{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.product{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:12px;
  width:250px;
}

button{
  padding:8px 15px;
  background:#00d1b2;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
  margin:5px;
}

input{
  padding:8px;
  border-radius:6px;
  border:none;
  margin:5px;
}

/* Chatbot Button */
#chatButton{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=500") center/cover;
  cursor:pointer;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* Chat Window */
#chatWindow{
  position:fixed;
  bottom:100px;
  right:25px;
  width:300px;
  background:rgba(0,0,0,0.9);
  padding:15px;
  border-radius:10px;
  display:none;
}

#chatMessages{
  height:200px;
  overflow-y:auto;
  font-size:14px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<header>
<h2>Santrix</h2>
<nav>
<a onclick="showSection('home')">Home</a>
<a onclick="showSection('store')">Store</a>
<a onclick="showSection('login')">Login</a>
</nav>
</header>

<!-- HOME -->
<section id="home">
<h1>Welcome to Santrix</h1>
<p>
Santrix is a futuristic technology startup focused on innovation, 
intelligent systems, and next-generation digital platforms. 
We build powerful tools designed for the modern world.
</p>
</section>

<!-- STORE -->
<section id="store" class="hidden">
<h1>Store</h1>
<div class="products" id="product-list"></div>

<h2>Cart</h2>
<div id="cart"></div>
<h3 id="total"></h3>
<button onclick="checkout()">Checkout</button>

<div id="adminPanel" class="hidden">
<h2>Admin Panel</h2>
<input type="text" id="prodName" placeholder="Product Name">
<input type="number" id="prodPrice" placeholder="Price">
<button onclick="addProduct()">Add</button>
<div id="adminProducts"></div>
</div>
</section>

<!-- LOGIN -->
<section id="login" class="hidden">
<h1>Login</h1>
<input type="text" id="loginUser" placeholder="Username"><br>
<input type="password" id="loginPass" placeholder="Password"><br>
<button onclick="login()">Login</button>

<h2>Create Account</h2>
<input type="text" id="signupUser" placeholder="Username"><br>
<input type="password" id="signupPass" placeholder="Password"><br>
<button onclick="signup()">Sign Up</button>
</section>

<!-- 🌍 AI Chatbot -->
<div id="chatButton" onclick="toggleChat()"></div>

<div id="chatWindow">
<div id="chatMessages"></div>
<input type="text" id="chatInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
// DATA
let products = JSON.parse(localStorage.getItem("santrix_products")) || [];
let users = JSON.parse(localStorage.getItem("santrix_users")) || [];
let currentUser = JSON.parse(localStorage.getItem("santrix_currentUser")) || null;
let cart = [];

// NAVIGATION
function showSection(id){
  document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
  renderProducts();
}

// LOGIN
function login(){
  const user=document.getElementById("loginUser").value;
  const pass=document.getElementById("loginPass").value;

  if(user==="admin" && pass==="1234"){
    currentUser={username:"admin",role:"admin"};
    localStorage.setItem("santrix_currentUser",JSON.stringify(currentUser));
    document.getElementById("adminPanel").classList.remove("hidden");
    showSection("store");
    return;
  }

  const found=users.find(u=>u.username===user && u.password===pass);
  if(!found){alert("Login failed");return;}

  currentUser={username:user,role:"user"};
  localStorage.setItem("santrix_currentUser",JSON.stringify(currentUser));
  document.getElementById("adminPanel").classList.add("hidden");
  showSection("store");
}

function signup(){
  const user=document.getElementById("signupUser").value;
  const pass=document.getElementById("signupPass").value;
  if(users.find(u=>u.username===user)){alert("User exists");return;}
  users.push({username:user,password:pass});
  localStorage.setItem("santrix_users",JSON.stringify(users));
  alert("Account created");
}

// PRODUCTS
function renderProducts(){
  const list=document.getElementById("product-list");
  list.innerHTML="";
  products.forEach((p,i)=>{
    list.innerHTML+=`
      <div class="product">
        <h3>${p.name}</h3>
        <p>£${p.price}</p>
        <button onclick="addToCart(${i})">Add to Cart</button>
      </div>`;
  });

  if(currentUser && currentUser.role==="admin"){
    document.getElementById("adminPanel").classList.remove("hidden");
    const adminList=document.getElementById("adminProducts");
    adminList.innerHTML="";
    products.forEach((p,i)=>{
      adminList.innerHTML+=`
        <div>${p.name} - £${p.price}
        <button onclick="removeProduct(${i})">Remove</button></div>`;
    });
  }

  renderCart();
}

function addProduct(){
  const name=document.getElementById("prodName").value;
  const price=document.getElementById("prodPrice").value;
  products.push({name,price});
  localStorage.setItem("santrix_products",JSON.stringify(products));
  renderProducts();
}

function removeProduct(i){
  products.splice(i,1);
  localStorage.setItem("santrix_products",JSON.stringify(products));
  renderProducts();
}

// CART
function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const cartDiv=document.getElementById("cart");
  cartDiv.innerHTML="";
  let total=0;
  cart.forEach((item,i)=>{
    total+=Number(item.price);
    cartDiv.innerHTML+=`<div>${item.name} - £${item.price}</div>`;
  });
  document.getElementById("total").innerText="Total: £"+total;
}

function checkout(){
  if(cart.length===0){alert("Cart empty");return;}
  alert("Checkout complete (simulation)");
  cart=[];
  renderCart();
}

// CHATBOT
function toggleChat(){
  const chat=document.getElementById("chatWindow");
  chat.style.display=chat.style.display==="none"?"block":"none";
}

function sendMessage(){
  const input=document.getElementById("chatInput");
  const msg=input.value.toLowerCase();
  const chat=document.getElementById("chatMessages");
  chat.innerHTML+="<div>You: "+msg+"</div>";

  let reply="I can help you navigate Santrix.";
  if(msg.includes("store")) reply="Click Store in the top right to browse products.";
  if(msg.includes("login")) reply="Click Login in the top right to access your account.";
  if(msg.includes("home")) reply="Click Home to return to the main page.";

  chat.innerHTML+="<div>Santrix AI: "+reply+"</div>";
  input.value="";
}

// INIT
showSection("home");
</script>

</body>
</html>
