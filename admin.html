<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Santrix Admin</title>
<style>
body{font-family:Arial;background:#f4f6f9;padding:50px;}
input{padding:10px;margin:5px;}
button{padding:8px 12px;background:#00d1b2;border:none;color:white;border-radius:5px;margin:5px;}
.product{background:white;padding:15px;margin:10px 0;border-radius:8px;}
</style>
</head>
<body>

<h2>Santrix Admin Dashboard</h2>

<h3>Add Product</h3>
<input type="text" id="productName" placeholder="Product Name">
<input type="number" id="productPrice" placeholder="Price">
<button onclick="addProduct()">Add</button>

<h3>Existing Products</h3>
<div id="admin-products"></div>

<br>
<a href="index.html">Return to Main Site</a>

<script>
function loadAdminProducts(){
  const container=document.getElementById("admin-products");
  container.innerHTML="";
  let products=JSON.parse(localStorage.getItem("santrix_products")) || [];
  products.forEach((p,index)=>{
    container.innerHTML+=`
      <div class="product">
        ${p.name} - £${p.price}
        <button onclick="removeProduct(${index})">Remove</button>
      </div>
    `;
  });
}

function addProduct(){
  const name=document.getElementById("productName").value;
  const price=document.getElementById("productPrice").value;

  if(!name || !price) return alert("Fill all fields");

  let products=JSON.parse(localStorage.getItem("santrix_products")) || [];
  products.push({name:name,price:price});
  localStorage.setItem("santrix_products",JSON.stringify(products));

  document.getElementById("productName").value="";
  document.getElementById("productPrice").value="";
  loadAdminProducts();
}

function removeProduct(index){
  let products=JSON.parse(localStorage.getItem("santrix_products")) || [];
  products.splice(index,1);
  localStorage.setItem("santrix_products",JSON.stringify(products));
  loadAdminProducts();
}

loadAdminProducts();
</script>

</body>
</html>
