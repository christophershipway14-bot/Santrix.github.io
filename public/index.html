<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Santrix</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  color:white;
  min-height:100vh;
  overflow-x:hidden;
}

/* Animated Earth Background */
body::before{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:url("https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?q=80&w=1920") no-repeat center center/cover;
  z-index:-2;
  animation:earthMove 60s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

@keyframes earthMove{
  0%{transform:scale(1.1) translateY(0);}
  50%{transform:scale(1.15) translateY(-20px);}
  100%{transform:scale(1.1) translateY(0);}
}

header{
  padding:20px;
  text-align:center;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.05);
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
}

section{
  padding:60px 20px;
  text-align:center;
}

.products{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.product{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:12px;
  width:250px;
}

button{
  padding:10px 18px;
  background:#00d1b2;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:20px;
  margin-top:40px;
  background:rgba(255,255,255,0.05);
}
</style>
</head>
<body>

<header>
<h1>Santrix</h1>
<nav>
<a href="login.html">Login</a>
</nav>
</header>

<section>
<h2>Our Products</h2>
<div class="products" id="product-list"></div>
</section>

<footer>© 2026 Santrix</footer>

<script>
async function loadProducts(){
  const res = await fetch("/api/products");
  const products = await res.json();
  const list = document.getElementById("product-list");
  list.innerHTML="";
  products.forEach(p=>{
    list.innerHTML+=`
      <div class="product">
        <h3>${p.name}</h3>
        <p>£${p.price}</p>
      </div>
    `;
  });
}
loadProducts();
</script>

</body>
</html>
